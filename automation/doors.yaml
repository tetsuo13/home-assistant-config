- alias: Front Doorbell Pressed
  id: front_doorbell_pressed
  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door_button_pressed
      to: "on"
  mode: queued
  actions:
    action: script.sonos_play_file
    data:
      audio_file: doorbell01.mp3
      everywhere: true

