              state: "on"
          sequence:
            - action: script.sonos_play_file
              data:
                audio_file: birthday01.mp3
                everywhere: false
        - conditions:
            - condition: state
              entity_id: binary_sensor.halloween_month
              state: "on"
          sequence:
            - action: script.sonos_play_file
              data:
                audio_file: howl01.mp3
                everywhere: false
        - conditions:
            - condition: state
              entity_id: binary_sensor.thanksgiving_month
              state: "on"
          sequence:
            - action: script.sonos_play_file
